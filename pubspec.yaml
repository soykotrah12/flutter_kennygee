name: flutter_kennegee
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.4.0 #android current: versionCode , ios current: build 1.0.4.0

environment:
  sdk: ^3.11.4


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.2
  flutter_stripe: ^12.0.2
  flutx_core: ^1.1.0+1
  hive_flutter: ^1.1.0
  dio: ^5.9.0
  equatable: ^2.0.7
  dartz: ^0.10.1
  google_fonts: ^6.3.2
  flutter_secure_storage: ^9.2.4
  restart_app: ^1.8.3
  connectivity_plus: ^7.0.0
  image_picker: ^1.2.0
  file_picker: ^10.3.3
  intl: ^0.19.0
  video_player: ^2.10.1
  pin_code_fields: ^8.0.1
  dotted_border: ^3.1.0
  google_maps_flutter: ^2.13.0
  geolocator: ^14.0.2
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.12.0


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: "^0.14.4"
  

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - shorebird.yaml

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Light.ttf
          weight: 300
        - asset: assets/fonts/Montserrat-Regular.ttf
          weight: 400
        - asset: assets/fonts/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/fonts/Montserrat-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700
        - asset: assets/fonts/Montserrat-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Montserrat-Black.ttf
          weight: 900
        - asset: assets/fonts/Montserrat-Italic.ttf
          style: italic
          weight: 400
        - asset: assets/fonts/Montserrat-BoldItalic.ttf
          style: italic
          weight: 700
